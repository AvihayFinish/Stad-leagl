Last Updated: April 2026

Your privacy is important to us. This Privacy Policy explains how Stad ("we", "us", "our") collects, uses, and protects your personal data.

1. WHO WE ARE
Stad is a social sports application. For questions about this policy, contact us at stadsports161@gmail.com.

2. DATA WE COLLECT
When you use Stad, we collect and store the following information:

Account Data:
• Email address, username, optional bio, and profile picture.

Content Data:
• Posts (text, images, videos), comments, likes, and reposts you create.

Preferences:
• Favorite sports teams and leagues, app language preference.

Usage Data:
• Posts you have viewed, search history within the app.
• Notification preferences and push notification token (for sending alerts).

Device Data:
• A unique device identifier (used to associate your push notification token with your device).
• Device model and platform (iOS or Android) and operating system version.

Engagement Signals (used for personalized feed):
• Anonymous engagement scores computed from your interaction patterns (likes, views, comments). These are processed on our server to build a personalized feed.
• Affinity scores between you and other authors, derived from your engagement behavior.

Advertising & Analytics Data (collected automatically by third-party SDKs):
• Advertising Identifier: your device's IDFA (iOS) or Google Advertising ID / GAID (Android), collected by Google AdMob to serve relevant ads.
• App usage events such as screen views and session duration, collected by Firebase Analytics.
• Crash diagnostics including device state, stack traces, IP address, and app version, collected by Sentry for error monitoring.

Device Permissions:
• Camera: accessed when you take photos or videos for posts (permission requested before use).
• Photo Library: accessed when you select media from your gallery for posts.
• Microphone: declared for potential audio features (permission requested before use).

3. HOW WE USE YOUR DATA
We use your data to:
• Operate and provide the Stad service.
• Personalize your content feed using ML-based engagement signals.
• Send push notifications for match events and social interactions (with your consent).
• Display in-app advertisements via Google AdMob, including personalized ads based on your advertising ID and device information.
• Detect app crashes and diagnose technical issues via Sentry crash reporting and session replay.
• Analyze app usage patterns via Firebase Analytics to improve the app experience.
• Improve the app and maintain service reliability.

We do NOT sell your personal data to third parties.

4. DATA STORAGE & SECURITY
Your data is stored on servers located in Frankfurt, Germany (EU), operated by Supabase (PostgreSQL database) and Google Firebase (Firestore — social content). Both providers implement industry-standard security measures.

• Social content (posts, comments, likes) is stored in Google Firebase Firestore.

All data within the EU is subject to GDPR protections.

We retain your data for as long as your account is active. When you delete your account, your profile, posts, and associated personal data are permanently deleted from our systems.

For more information, see Google's Privacy Policy: policies.google.com/privacy

• Access the personal data we hold about you.
• Correct inaccurate data.
• Request deletion of your data ("right to be forgotten").
• Object to or restrict processing of your data.
• Data portability.

CCPA — California Residents:
If you are a California resident, you have the right to:
• Know what personal information we collect, use, and disclose.
• Request deletion of personal information we have collected about you.
• Opt out of the sale or sharing of personal information (we do not sell your data).
• Non-discrimination for exercising your privacy rights.

To exercise any of these rights, contact us at stadsports161@gmail.com.

8. THIRD-PARTY SERVICES
We use the following third-party services. Each may collect data as described in their respective privacy policies:

• Supabase (database & authentication) — supabase.com/privacy
• Google Firebase (authentication, real-time database, analytics, push messaging) — firebase.google.com/support/privacy
• Google AdMob (in-app advertising) — policies.google.com/privacy
• Sentry (crash reporting & session replay) — sentry.io/privacy
• Expo (push notifications & app infrastructure) — expo.dev/privacy

9. CHILDREN'S PRIVACY
Stad is not intended for children under the age of 13. We do not knowingly collect personal data from children.

10. COOKIES & TRACKING
Stad is a mobile application and does not use browser cookies. We use session tokens to keep you logged in.

However, like most apps, Stad uses mobile tracking technologies:
• Advertising Identifiers (IDFA / GAID) via Google AdMob for personalized ads.
• Session replay technology via Sentry to capture anonymized screen interactions for debugging (10% of sessions; 100% when errors occur).

You can opt out of ad-based tracking via your device settings as described in Section 6.

11. CHANGES TO THIS POLICY
We may update this policy periodically. We will notify you of significant changes through the app.

12. CONTACT
For privacy-related inquiries: stadsports161@gmail.com`,
