<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stad Legal Documents</title>
    <style>
      :root { color-scheme: light dark; --bg:#fff; --card:#f7f7f9; --text:#111827; --muted:#4b5563; --accent:#2563eb; --border:#e5e7eb; }
      @media (prefers-color-scheme: dark) { :root { --bg:#0b1020; --card:#111827; --text:#f9fafb; --muted:#cbd5e1; --accent:#60a5fa; --border:#1f2937; } }
      body { margin:0; font-family: Inter, Segoe UI, Roboto, Arial, sans-serif; background:var(--bg); color:var(--text); }
      .wrap { max-width:900px; margin:0 auto; padding:24px; }
      .card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:20px; }
      h1 { margin-top:0; }
      .meta { color:var(--muted); }
      .links { display:flex; gap:12px; flex-wrap:wrap; margin-top:16px; }
      .btn { display:inline-block; padding:10px 14px; border-radius:10px; border:1px solid var(--border); text-decoration:none; color:var(--text); background:transparent; }
      .btn:hover { border-color: var(--accent); color: var(--accent); }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>Stad Legal Documents</h1>
        <p class="meta">Privacy Policy and Terms of Use</p>
        <div class="links">
          <a class="btn" href="privacy.html?lang=en">Privacy Policy (English)</a>
          <a class="btn" href="privacy.html?lang=he">מדיניות פרטיות (עברית)</a>
          <a class="btn" href="terms.html?lang=en">Terms of Use (English)</a>
          <a class="btn" href="terms.html?lang=he">תנאי שימוש (עברית)</a>
        </div>
      </section>
    </main>
  </body>
</html>
